<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ADMIN LOGIN</title>

  <style>

    body{
      background:#07142a;
      color:white;
      font-family:monospace;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
      margin:0;
    }

    .box{
      width:400px;
      background:#182845;
      padding:40px;
      border-radius:20px;
      border:1px solid #294b7a;
    }

    h1{
      margin-top:0;
    }

    input{
      width:100%;
      padding:15px;
      margin-top:15px;
      background:#07142a;
      border:1px solid #294b7a;
      color:white;
      box-sizing:border-box;
      border-radius:10px;
    }

    button{
      width:100%;
      margin-top:20px;
      padding:15px;
      border:none;
      border-radius:10px;
      background:#1299d6;
      color:white;
      cursor:pointer;
      font-size:16px;
    }

    button:hover{
      opacity:.9;
    }

  </style>
</head>
<body>

<div class="box">

  <h1>ADMIN LOGIN</h1>

  <input
    id="user"
    placeholder="Login"
  >

  <input
    id="pass"
    type="password"
    placeholder="Hasło"
  >

  <button id="login-btn">
    LOGIN
  </button>

</div>

<script>

document
  .getElementById('login-btn')
  .addEventListener('click', async () => {

    const username =
      document.getElementById('user').value;

    const password =
      document.getElementById('pass').value;

    try{

      const response =
        await fetch('/api/admin/login', {

          method:'POST',

          headers:{
            'Content-Type':'application/json'
          },

          body:JSON.stringify({
            username,
            password
          })
        });

      if(response.ok){

        window.location.href =
          '/admin/dashboard.html';

      }else{

        alert('Błędny login lub hasło');
      }

    }catch(e){

      alert('Błąd połączenia');
    }

});

</script>

</body>
</html>
